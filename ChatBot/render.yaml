services:
  - type: web
    name: chatbot-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: MONGO_URI
        sync: false        # set manually in Render dashboard
      - key: GROQ_API_KEY
        sync: false        # set manually in Render dashboard
      - key: PORT
        value: 10000       # Render requires port 10000
